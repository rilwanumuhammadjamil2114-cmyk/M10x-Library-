<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M10x-liabrary · signup + login (no Parma)</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e9f3e6 0%, #c8dbc1 100%);
            padding: 1rem;
        }

        /* main white card */
        .auth-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 2rem 2rem 2rem 2rem;
            border-radius: 36px;
            box-shadow: 0 25px 40px -12px rgba(0, 51, 0, 0.35);
            border: 1px solid #c0ddb5;
        }

        /* library icon + M10x-liabrary (exact spelling) */
        .library-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .icon-circle {
            background-color: #1c4b2d;
            width: 80px;
            height: 80px;
            border-radius: 30px 30px 30px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 12px 16px -8px #1c4b2d80;
            border: 2px solid #e6ffe6;
        }

        .icon-circle i {
            font-size: 3.2rem;
            color: white;
        }

        .library-header h1 {
            font-size: 2.1rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-align: center;
            background: linear-gradient(130deg, #154f26, #246b3b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px #b8d9b0;
            margin: 0;
            line-height: 1.2;
            border-bottom: 2px dotted #98c0a0;
            padding-bottom: 0.2rem;
        }

        .header-hint {
            font-size: 0.95rem;
            color: #347a45;
            margin-top: 6px;
            background: #f0f9ec;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
        }

        /* tab switcher */
        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0 1.8rem 0;
            background: #e5f2e5;
            padding: 0.4rem;
            border-radius: 50px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.7rem 0.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            color: #1d5e2b;
            border: 1px solid transparent;
        }
        .tab.active {
            background: white;
            color: #0f481f;
            box-shadow: 0 6px 12px #b7d9b7;
            border: 1px solid #a7c9a7;
            font-weight: 700;
        }
        .tab i {
            margin-right: 6px;
        }

        /* forms (only active one visible) */
        .form-panel {
            display: none;
        }
        .form-panel.active-panel {
            display: block;
        }

        .input-group {
            margin-bottom: 1.3rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #0f3b1e;
        }
        .input-label i {
            color: #1f6e3b;
            width: 20px;
        }

        .input-field {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background-color: white;
            border: 2px solid #9fc0a5;
            border-radius: 28px;
            font-size: 1rem;
            outline: none;
            transition: all 0.15s;
            color: #1a3a24;
        }
        .input-field:focus {
            border-color: #1d6e32;
            box-shadow: 0 0 0 4px rgba(45, 125, 70, 0.2);
        }
        .input-field::placeholder {
            color: #83a78b;
        }

        .double-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .double-row .input-group {
            flex: 1 1 160px;
        }

        .action-btn {
            background-color: #1d542d;
            color: white;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 1rem 0 0.5rem 0;
            cursor: pointer;
            box-shadow: 0 14px 18px -8px #1b4f29;
            transition: 0.15s;
            border: 1px solid #c4e6c4;
        }
        .action-btn:hover {
            background-color: #0f421f;
            transform: translateY(-2px);
            box-shadow: 0 18px 22px -8px #143f1f;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 6px 12px -6px #0c2f15;
        }

        /* records / user list */
        .records-section {
            margin-top: 2rem;
            background: #f4faf2;
            border-radius: 28px;
            padding: 1.3rem 1.2rem 1rem 1.2rem;
            border: 1px solid #b1d3b6;
        }
        .records-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: #1b562b;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .records-header i {
            background: #1c4b2d;
            color: white;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid white;
        }
        .records-header i:hover {
            background: #0f381d;
        }

        .record-item {
            background: white;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            margin-bottom: 10px;
            border-left: 6px solid #1c4b2d;
            box-shadow: 0 3px 8px #d0e4d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .record-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            color: #1f4429;
        }
        .record-info strong {
            color: #0b4a1f;
            min-width: 70px;
        }
        .delete-icon {
            color: #a54836;
            background: #ffe6e1;
            padding: 8px 10px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            border: 1px solid #f3bfb0;
        }
        .delete-icon:hover {
            background: #d32f2f;
            color: white;
        }
        .no-records {
            color: #6a9072;
            font-style: italic;
            padding: 0.5rem;
            text-align: center;
        }

        .small-note {
            background: #eef9ea;
            color: #266339;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            text-align: center;
            font-size: 0.85rem;
            margin: 1rem 0 0 0;
            border: 1px solid #a6d4b2;
        }
        .footer-links {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .footer-links span {
            color: #1c5e2d;
            background: #e2f0de;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1px solid #b1d7b8;
            cursor: pointer;
        }
        .footer-links span:hover {
            background: #cae9d1;
        }
        .message {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            text-align: center;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .success-msg {
            background: #d9f0da;
            color: #115f27;
        }
        .error-msg {
            background: #ffe6e1;
            color: #a3321d;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <!-- library header -->
    <div class="library-header">
        <div class="icon-circle">
            <i class="fas fa-landmark"></i>
        </div>
        <h1>M10x-liabrary</h1>
        <span class="header-hint"><i class="fa-regular fa-bookmark"></i> sign in / create account</span>
    </div>

    <!-- tab switcher -->
    <div class="tab-container">
        <div class="tab active" id="tabSignup" onclick="switchPanel('signup')"><i class="fa-regular fa-pen-to-square"></i> sign up</div>
        <div class="tab" id="tabLogin" onclick="switchPanel('login')"><i class="fa-regular fa-id-card"></i> log in</div>
    </div>

    <!-- SIGNUP PANEL (only admission + passkey - NO PARMA) -->
    <div id="signupPanel" class="form-panel active-panel">
        <form id="signupForm" onsubmit="event.preventDefault(); signupUser();">
            <div class="double-row">
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-id-card"></i> Admission No.</span>
                    <input class="input-field" type="text" id="signupAdmission" placeholder="e.g., AD2025-178" required>
                </div>
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                    <input class="input-field" type="password" id="signupPasskey" placeholder="min 4 chars" required minlength="4">
                </div>
            </div>
            <!-- Parma field completely removed -->
            <button class="action-btn" type="submit"><i class="fa-regular fa-floppy-disk"></i> create account → store</button>
        </form>
    </div>

    <!-- LOGIN PANEL (only admission + passkey) -->
    <div id="loginPanel" class="form-panel">
        <form id="loginForm" onsubmit="event.preventDefault(); loginUser();">
            <div class="input-group">
                <span class="input-label"><i class="fas fa-id-card"></i> Admission number</span>
                <input class="input-field" type="text" id="loginAdmission" placeholder="your admission" required>
            </div>
            <div class="input-group">
                <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                <input class="input-field" type="password" id="loginPasskey" placeholder="••••••••" required>
            </div>
            <button class="action-btn" type="submit"><i class="fa-regular fa-id-card"></i> log in → verify</button>
        </form>
    </div>

    <!-- message area (success/error) -->
    <div id="authMessage" class="message"></div>

    <!-- RECORDS: shows all stored entries (admission + passkey only) -->
    <div class="records-section">
        <div class="records-header">
            <span><i class="fa-regular fa-hard-drive"></i> stored users</span>
            <i class="fas fa-rotate-right" onclick="renderRecords()" title="refresh"></i>
        </div>
        <div id="recordsContainer">
            <!-- dynamic from localStorage -->
        </div>
    </div>

    <!-- utility clear & hint -->
    <div class="footer-links">
        <span onclick="clearAllRecords()"><i class="fa-regular fa-trash-can"></i> delete all</span>
    </div>
    <div class="small-note">
        <i class="fa-regular fa-circle-check"></i> signup stores admission + passkey · login verifies
    </div>
</div>

<script>
    (function() {
        // Initialize storage
        if (!localStorage.getItem('m10xUsers')) {
            localStorage.setItem('m10xUsers', JSON.stringify([]));
        }

        // DOM elements
        const signupPanel = document.getElementById('signupPanel');
        const loginPanel = document.getElementById('loginPanel');
        const tabSignup = document.getElementById('tabSignup');
        const tabLogin = document.getElementById('tabLogin');
        const authMessage = document.getElementById('authMessage');

        // switch panel function (global)
        window.switchPanel = function(panel) {
            if (panel === 'signup') {
                signupPanel.classList.add('active-panel');
                loginPanel.classList.remove('active-panel');
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
            } else {
                loginPanel.classList.add('active-panel');
                signupPanel.classList.remove('active-panel');
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
            }
            clearMessage();
        };

        function clearMessage() {
            authMessage.innerHTML = '';
            authMessage.className = 'message';
        }

        function showMessage(text, isSuccess = true) {
            authMessage.innerHTML = text;
            authMessage.className = isSuccess ? 'message success-msg' : 'message error-msg';
        }

        // --- SIGNUP function (stores only admission + passkey) ---
        window.signupUser = function() {
            const admission = document.getElementById('signupAdmission').value.trim();
            const passkey = document.getElementById('signupPasskey').value.trim();

            if (!admission || !passkey) {
                showMessage('❌ Both admission number and passkey are required.', false);
                return;
            }
            if (passkey.length < 4) {
                showMessage('❌ Passkey must be at least 4 characters.', false);
                return;
            }

            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];

            const newEntry = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                admission: admission,
                passkey: passkey,      // stored plain (demo only)
                timestamp: new Date().toLocaleString()
            };

            users.push(newEntry);
            localStorage.setItem('m10xUsers', JSON.stringify(users));

            // clear signup fields
            document.getElementById('signupAdmission').value = '';
            document.getElementById('signupPasskey').value = '';

            renderRecords();
            showMessage('✅ Signup successful! Data stored.', true);
        };

        // --- LOGIN function (verifies admission + passkey match a stored record) ---
        window.loginUser = function() {
            const admission = document.getElementById('loginAdmission').value.trim();
            const passkey = document.getElementById('loginPasskey').value.trim();

            if (!admission || !passkey) {
                showMessage('❌ Enter both admission number and passkey.', false);
                return;
            }

            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            // Find match (case-sensitive)
            const matchedUser = users.find(user => user.admission === admission && user.passkey === passkey);

            if (matchedUser) {
                showMessage(`✅ Login successful! Welcome, ${matchedUser.admission}`, true);
                // optional: clear login fields
                document.getElementById('loginAdmission').value = '';
                document.getElementById('loginPasskey').value = '';
            } else {
                showMessage('❌ No matching user. Check admission & passkey, or sign up.', false);
            }
        };

        // --- render stored records (with delete) ---
        window.renderRecords = function() {
            const container = document.getElementById('recordsContainer');
            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];

            if (!users.length) {
                container.innerHTML = '<div class="no-records"><i class="fa-regular fa-folder-open"></i> no users yet — sign up above</div>';
                return;
            }

            // show newest first
            const sorted = [...users].reverse();
            let html = '';
            sorted.forEach(entry => {
                const adm = escapeHtml(entry.admission || '');
                // show masked passkey (indicates stored)
                const maskedPass = entry.passkey ? '•'.repeat(Math.min(entry.passkey.length, 8)) : '';
                const time = entry.timestamp || '';
                html += `<div class="record-item" data-id="${entry.id}">
                    <div class="record-info">
                        <span><strong>adm:</strong> ${adm}</span>
                        <span><strong>key:</strong> ${maskedPass}</span>
                        <span style="font-size:0.7rem; color:#567f5e;">${time}</span>
                    </div>
                    <div class="delete-icon" onclick="deleteRecord('${entry.id}')" title="delete"><i class="fa-regular fa-trash-can"></i></div>
                </div>`;
            });
            container.innerHTML = html;
        };

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        window.deleteRecord = function(id) {
            let users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            users = users.filter(entry => entry.id != id);
            localStorage.setItem('m10xUsers', JSON.stringify(users));
            renderRecords();
            clearMessage();
        };

        window.clearAllRecords = function() {
            if (confirm('Delete ALL stored users? (admission + passkey)')) {
                localStorage.setItem('m10xUsers', JSON.stringify([]));
                renderRecords();
                clearMessage();
            }
        };

        // initial render
        renderRecords();

        // make functions globally available
        window.switchPanel = switchPanel;
        window.signupUser = signupUser;
        window.loginUser = loginUser;
        window.renderRecords = renderRecords;
        window.deleteRecord = deleteRecord;
        window.clearAllRecords = clearAllRecords;
    })();
</script>
</body>
</html>
