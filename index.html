<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP library · redirect</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #c8dbc1;
            padding: 1rem;
        }

        /* main white card */
        .auth-card {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 2rem 2rem 1rem 2rem;
            border-radius: 24px;
            border: 2px solid #1c4b2d;
            opacity: 0;
            transform: scale(0.95);
            animation: cardAppear 0.5s ease-out 2.5s forwards;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: scale(1); }
        }

        /* header – bold, with hint line restored */
        .library-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .library-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1c4b2d;
            border-bottom: 2px solid #98c0a0;
            padding-bottom: 0.3rem;
            display: inline-block;
        }
        .header-hint {
            display: block;
            margin-top: 0.5rem;
            color: #1c4b2d;
            background: #e0f0e0;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* tabs – height doubled */
        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            background: #d0e8d0;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1.2rem 0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2rem;
            color: #1c4b2d;
            border: 1px solid transparent;
        }
        .tab.active {
            background: white;
            border: 1px solid #1c4b2d;
            font-weight: 700;
        }

        /* forms */
        .form-panel { display: none; }
        .form-panel.active-panel { display: block; }

        .input-group { margin-bottom: 1.2rem; }
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #0f3b1e;
        }
        .input-label i {
            color: #1f6e3b;
            width: 20px;
        }
        .input-field {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 2px solid #9fc0a5;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            color: #1a3a24;
        }
        .input-field:focus { border-color: #1c4b2d; }
        .double-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .double-row .input-group { flex: 1 1 160px; }

        .action-btn {
            background-color: #1c4b2d;
            color: white;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0 0.5rem;
            border: 1px solid #9fc0a5;
        }
        .action-btn:hover { background-color: #0f381d; }

        /* dashboard panel */
        .dashboard-panel { display: none; }
        .dashboard-panel.active-panel { display: block; }

        .welcome-card {
            background: #e0f0e0;
            border-radius: 24px;
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px solid #1c4b2d;
        }
        .personal-welcome {
            font-size: 1.3rem;
            color: #1c4b2d;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .dashboard-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .stat-box {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            flex: 1 1 120px;
            text-align: center;
            border: 1px solid #1c4b2d;
        }
        .stat-box i { font-size: 1.8rem; color: #1c4b2d; }
        .stat-box div { font-weight: 700; }

        /* records – only visible to admin */
        .records-section {
            background: #f0f8f0;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #1c4b2d;
            margin-top: 1rem;
        }
        .records-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: #1b562b;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .records-header i {
            background: #1c4b2d;
            color: white;
            padding: 5px 8px;
            border-radius: 50%;
            cursor: pointer;
        }
        .record-item {
            background: white;
            border-radius: 30px;
            padding: 0.7rem 1rem;
            margin-bottom: 8px;
            border-left: 6px solid #1c4b2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .record-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            color: #1f4429;
        }
        .record-info strong {
            color: #0b4a1f;
            min-width: 70px;
            font-weight: 700;
        }
        .delete-icon {
            color: #a54836;
            background: #ffe6e1;
            padding: 5px 8px;
            border-radius: 30px;
            cursor: pointer;
        }
        .delete-icon:hover {
            background: #d32f2f;
            color: white;
        }
        .no-records {
            color: #6a9072;
            font-style: italic;
            padding: 0.5rem;
            text-align: center;
        }

        /* message area */
        .message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 30px;
            text-align: center;
            background: #e0f0e0;
        }

        /* ===== FOOTER BAR – original icon style (black background) ===== */
        .footer-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: black;
            margin: 2rem -2rem -1rem -2rem;
            padding: 0.8rem 0.5rem;
            border-top: 1px solid #333;
            gap: 0.3rem;
            flex-wrap: nowrap;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            min-width: 70px;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.1s;
            text-align: center;
            position: relative;
        }
        .footer-item i {
            font-size: 1.2rem;
            margin-bottom: 2px;
            color: white;
        }
        .footer-item:hover {
            background: #333;
        }
        .footer-item.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .footer-item.loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== Box layout for HD/PQ (with dropdowns) ===== */
        .box-page {
            background: #f5fff5;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #1c4b2d;
            margin: 1rem 0;
            height: auto;
            overflow-y: visible;
        }
        .box-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .price-box {
            background: white;
            border: 1px solid #1c4b2d;
            border-radius: 16px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .box-label {
            font-weight: 600;
            color: #1c4b2d;
            min-width: 120px;
            font-size: 1rem;
        }
        .box-select {
            flex: 1;
            min-width: 150px;
            padding: 0.4rem 0.8rem;
            border: 2px solid #1c4b2d;
            border-radius: 30px;
            background: white;
            font-size: 0.9rem;
            color: #1c4b2d;
            cursor: pointer;
            outline: none;
        }
        .box-select:hover {
            background: #f0faf0;
        }

        /* ===== Enhanced preview panel for CMP 201 lectures ===== */
        .preview-panel {
            background: #fefefe;
            border: 2px solid #1c4b2d;
            border-radius: 24px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,40,0,0.15);
        }
        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .preview-header h3 {
            color: #1c4b2d;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }
        .preview-actions {
            display: flex;
            gap: 0.5rem;
        }
        .preview-btn {
            background: #1c4b2d;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.1s;
            font-weight: 600;
        }
        .preview-btn:hover {
            background: #0f381d;
        }
        .preview-content {
            background: #f9fff9;
            border: 1px solid #b0d0b0;
            border-radius: 18px;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            font-family: 'Times New Roman', serif;
            max-height: 400px;
            overflow-y: auto;
            color: #1a3a24;
        }
        /* Full-screen mode for preview – edge to edge */
        .preview-panel.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            background: white;
            margin: 0;
            border-radius: 0;
            border: none;
            padding: 0;
            overflow-y: auto;
        }
        .preview-panel.fullscreen .preview-header {
            padding: 1rem 2rem 0 2rem;
        }
        .preview-panel.fullscreen .preview-content {
            max-height: calc(100vh - 80px);
            font-size: 1.2rem;
            margin: 0 2rem 2rem 2rem;
            padding: 1.5rem;
        }

        /* ===== Semester tabs for COURSES page ===== */
        .semester-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #d0e8d0;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .semester-tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: #1c4b2d;
            border: 1px solid transparent;
            background: transparent;
        }
        .semester-tab.active {
            background: white;
            border: 1px solid #1c4b2d;
            font-weight: 700;
        }

        /* Simple course list (no dropdowns) */
        .course-list {
            background: #f5fff5;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #1c4b2d;
        }
        .course-item {
            background: white;
            border: 1px solid #1c4b2d;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: #1c4b2d;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .course-item i {
            color: #1c4b2d;
            font-size: 1.2rem;
        }
        .course-item:last-child {
            margin-bottom: 0;
        }

        /* animated splash */
        .splash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1c4b2d;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: splashFadeOut 0.8s ease-in-out 2.2s forwards;
        }
        .splash-content {
            text-align: center;
            color: white;
            animation: splashPop 1.2s infinite alternate ease-in-out;
        }
        .splash-content i {
            font-size: 5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px #b5e6b5);
        }
        .splash-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .splash-content p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }
        @keyframes splashPop {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.08); opacity: 1; }
        }
        @keyframes splashFadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* user guide overlay */
        .guide-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28, 75, 45, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.5s;
        }
        .guide-card {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 30px;
            padding: 2rem 1.5rem 1.5rem;
            border: 4px solid #b5e6b5;
            box-shadow: 0 0 30px #a5d6a5;
        }
        .guide-slide {
            text-align: center;
        }
        .guide-slide h2 {
            color: #1c4b2d;
            margin-bottom: 1rem;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .guide-slide p {
            color: #1c4b2d;
            font-size: 1.1rem;
            margin: 1rem 0;
            line-height: 1.5;
        }
        .guide-slide i {
            font-size: 3.5rem;
            color: #1c4b2d;
            margin: 1rem 0;
        }
        .guide-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0 1rem;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #b0d0b0;
            cursor: pointer;
        }
        .dot.active {
            background: #1c4b2d;
        }
        .guide-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .guide-btn {
            background: #1c4b2d;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        .guide-btn.outline {
            background: transparent;
            border: 2px solid #1c4b2d;
            color: #1c4b2d;
        }
        .guide-btn:hover {
            background: #0f381d;
            color: white;
        }
        .guide-btn.outline:hover {
            background: #e0f0e0;
        }

        /* credit line below footer */
        .footer-credit {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #1c4b2d;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="splash-overlay" id="splashOverlay">
        <div class="splash-content">
            <i class="fa-solid fa-book-open"></i>
            <h1>CMP Library</h1>
            <p>chapter 2 of 4</p>
        </div>
    </div>

    <!-- main auth card -->
    <div class="auth-card">
        <div class="library-header">
            <h1>CMP chapter 2 of 4 library</h1>
            <span class="header-hint" id="globalHint"><i class="fa-regular fa-bookmark"></i> sign in / create account</span>
        </div>

        <!-- tabs -->
        <div id="tabContainer" class="tab-container">
            <div class="tab active" id="tabSignup" onclick="switchPanel('signup')"><i class="fa-regular fa-pen-to-square"></i> sign up</div>
            <div class="tab" id="tabLogin" onclick="switchPanel('login')"><i class="fa-regular fa-id-card"></i> log in</div>
        </div>

        <!-- SIGNUP -->
        <div id="signupPanel" class="form-panel active-panel">
            <form onsubmit="event.preventDefault(); signupUser();">
                <div class="double-row">
                    <div class="input-group">
                        <span class="input-label"><i class="fas fa-id-card"></i> Admission No.</span>
                        <input class="input-field" type="text" id="signupAdmission" placeholder="e.g., AD2025-178" required>
                    </div>
                    <div class="input-group">
                        <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                        <input class="input-field" type="password" id="signupPasskey" placeholder="min 4 chars" required minlength="4">
                    </div>
                </div>
                <button class="action-btn" type="submit"><i class="fa-regular fa-floppy-disk"></i> create account</button>
            </form>
        </div>

        <!-- LOGIN -->
        <div id="loginPanel" class="form-panel">
            <form onsubmit="event.preventDefault(); loginUser();">
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-id-card"></i> Admission number</span>
                    <input class="input-field" type="text" id="loginAdmission" placeholder="your admission" required>
                </div>
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                    <input class="input-field" type="password" id="loginPasskey" placeholder="••••••••" required>
                </div>
                <button class="action-btn" type="submit"><i class="fa-regular fa-id-card"></i> log in</button>
            </form>
        </div>

        <!-- DASHBOARD (hidden until after guide + redirect) -->
        <div id="dashboardPanel" class="dashboard-panel">
            <div class="welcome-card">
                <div class="personal-welcome" id="personalWelcome">
                    <i class="fa-regular fa-hand-wave"></i> Welcome, <span id="welcomeAdmission">User</span>!
                </div>
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fa-regular fa-id-card"></i>
                        <div><strong id="dashboardAdmission">---</strong></div>
                        <div>admission</div>
                    </div>
                    <div class="stat-box">
                        <i class="fa-regular fa-calendar"></i>
                        <div><strong id="dashboardSince">---</strong></div>
                        <div>member since</div>
                    </div>
                </div>
                <button class="action-btn logout-btn" onclick="logout()" style="background:#c94f4f;"><i class="fa-regular fa-arrow-left-from-bracket"></i> log out</button>
            </div>

            <!-- Admin-only records section (hidden for normal users) -->
            <div id="adminRecordsSection" style="display: none;">
                <div class="records-section">
                    <div class="records-header">
                        <span><i class="fa-regular fa-hard-drive"></i> Admin Panel · all registered users</span>
                        <i class="fas fa-rotate-right" onclick="renderDashboardRecords()" title="refresh"></i>
                    </div>
                    <div id="dashboardRecordsContainer"></div>
                </div>
            </div>
        </div>

        <!-- container for dynamic pages (HD, PQ, COURSES) -->
        <div id="dynamicPageContainer" style="min-height: 300px;"></div>

        <!-- message area -->
        <div id="authMessage" class="message"></div>

        <!-- FOOTER BAR – original icon style (black background) -->
        <div class="footer-bar">
            <div class="footer-item" onclick="handleFooterClickWithDelay('dashboard')">
                <i class="fa-solid fa-book-open"></i>
                <span>DASHBOARD</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('hd')">
                <i class="fa-solid fa-book"></i>
                <span>HD</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('pq')">
                <i class="fa-solid fa-bookmark"></i>
                <span>PQ</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('courses')">
                <i class="fa-solid fa-books"></i>
                <span>COURSES</span>
            </div>
        </div>
    </div>

    <!-- Credit line below footer -->
    <div class="footer-credit">
        powered by tech by me (Muhammad Jamil)
    </div>

    <!-- Guide overlay (hidden by default) -->
    <div id="guideOverlay" class="guide-overlay" style="display: none;">
        <div class="guide-card">
            <div id="guideSlideContainer" class="guide-slide"></div>
            <div class="guide-dots" id="guideDots"></div>
            <div class="guide-buttons">
                <button class="guide-btn outline" id="guidePrevBtn" onclick="guidePrev()">Previous</button>
                <button class="guide-btn" id="guideNextBtn" onclick="guideNext()">Next</button>
                <button class="guide-btn" id="guideFinishBtn" onclick="guideFinish()" style="display: none;">Go to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let currentUser = null;
            const ADMIN_ADMISSION = "ADMIN001";

            if (!localStorage.getItem('m10xUsers')) {
                localStorage.setItem('m10xUsers', JSON.stringify([]));
            }

            const guideSlides = [
                { icon: 'fa-regular fa-hand-wave', title: 'Welcome to CMP Library!', text: 'We’re glad to have you here. This guide will show you the basics.' },
                { icon: 'fa-solid fa-book-open', title: 'Dashboard', text: 'Your personal hub. View your stats and (if you are admin) all registered users.' },
                { icon: 'fa-solid fa-book', title: 'HD & PQ Pages', text: 'Each contains boxes with course codes and dropdowns.' },
                { icon: 'fa-solid fa-books', title: 'Courses', text: 'Now with semester tabs and a simple course list.' },
                { icon: 'fa-regular fa-circle-check', title: 'You’re all set!', text: 'Click "Go to Dashboard" to start.' }
            ];
            let currentSlide = 0;

            // DOM
            const tabContainer = document.getElementById('tabContainer');
            const signupPanel = document.getElementById('signupPanel');
            const loginPanel = document.getElementById('loginPanel');
            const dashboardPanel = document.getElementById('dashboardPanel');
            const adminRecordsSection = document.getElementById('adminRecordsSection');
            const tabSignup = document.getElementById('tabSignup');
            const tabLogin = document.getElementById('tabLogin');
            const authMessage = document.getElementById('authMessage');
            const globalHint = document.getElementById('globalHint');
            const dynamicContainer = document.getElementById('dynamicPageContainer');
            const guideOverlay = document.getElementById('guideOverlay');
            const guideSlideContainer = document.getElementById('guideSlideContainer');
            const guideDots = document.getElementById('guideDots');
            const guidePrevBtn = document.getElementById('guidePrevBtn');
            const guideNextBtn = document.getElementById('guideNextBtn');
            const guideFinishBtn = document.getElementById('guideFinishBtn');

            const welcomeAdmission = document.getElementById('welcomeAdmission');

            function clearMessage() { authMessage.innerHTML = ''; }
            function showMessage(text, isSuccess = true) {
                authMessage.innerHTML = text;
                authMessage.style.background = isSuccess ? '#d9f0da' : '#ffe6e1';
            }
            function escapeHtml(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
            }

            window.renderDashboardRecords = function() {
                if (!currentUser || currentUser.admission !== ADMIN_ADMISSION) return;
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                if (!users.length) {
                    dashboardRecordsContainer.innerHTML = '<div class="no-records">no users yet</div>';
                    return;
                }
                const sorted = [...users].reverse();
                let html = '';
                sorted.forEach(entry => {
                    const adm = escapeHtml(entry.admission);
                    const maskedPass = entry.passkey ? '•'.repeat(Math.min(entry.passkey.length, 8)) : '';
                    const time = entry.timestamp || '';
                    const isCurrent = currentUser && entry.id === currentUser.id;
                    const highlightStyle = isCurrent ? 'background:#d9f0da; border-left-color: #0b4a1f;' : '';
                    html += `<div class="record-item" style="${highlightStyle}">
                        <div class="record-info">
                            <span><strong>adm:</strong> ${adm} ${isCurrent ? ' (you)' : ''}</span>
                            <span><strong>key:</strong> ${maskedPass}</span>
                            <span style="font-size:0.7rem; color:#567f5e;">${time}</span>
                        </div>
                        <div class="delete-icon" onclick="deleteRecord('${entry.id}')" title="delete"><i class="fa-regular fa-trash-can"></i></div>
                    </div>`;
                });
                dashboardRecordsContainer.innerHTML = html;
            };

            function updateGuide() {
                const slide = guideSlides[currentSlide];
                guideSlideContainer.innerHTML = `
                    <i class="${slide.icon}"></i>
                    <h2>${slide.title}</h2>
                    <p>${slide.text}</p>
                `;
                let dotsHtml = '';
                guideSlides.forEach((_, index) => {
                    dotsHtml += `<span class="dot ${index === currentSlide ? 'active' : ''}" onclick="guideJumpTo(${index})"></span>`;
                });
                guideDots.innerHTML = dotsHtml;

                guidePrevBtn.style.display = currentSlide === 0 ? 'none' : 'inline-block';
                guideNextBtn.style.display = currentSlide === guideSlides.length - 1 ? 'none' : 'inline-block';
                guideFinishBtn.style.display = currentSlide === guideSlides.length - 1 ? 'inline-block' : 'none';
            }

            window.guideNext = function() {
                if (currentSlide < guideSlides.length - 1) {
                    currentSlide++;
                    updateGuide();
                }
            };

            window.guidePrev = function() {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateGuide();
                }
            };

            window.guideJumpTo = function(index) {
                currentSlide = index;
                updateGuide();
            };

            window.signupUser = function() {
                const admission = document.getElementById('signupAdmission').value.trim();
                const passkey = document.getElementById('signupPasskey').value.trim();
                if (!admission || !passkey) { showMessage('❌ Both fields required', false); return; }
                if (passkey.length < 4) { showMessage('❌ Passkey min 4 chars', false); return; }
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const newEntry = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                    admission, passkey, timestamp: new Date().toLocaleString()
                };
                users.push(newEntry);
                localStorage.setItem('m10xUsers', JSON.stringify(users));
                document.getElementById('signupAdmission').value = '';
                document.getElementById('signupPasskey').value = '';
                showMessage('✅ Signup successful! You can now log in.', true);
            };

            window.loginUser = function() {
                const admission = document.getElementById('loginAdmission').value.trim();
                const passkey = document.getElementById('loginPasskey').value.trim();
                if (!admission || !passkey) { showMessage('❌ Enter both', false); return; }
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const matched = users.find(u => u.admission === admission && u.passkey === passkey);
                if (matched) {
                    currentUser = { ...matched };
                    updateUIForUser();
                    document.getElementById('loginAdmission').value = '';
                    document.getElementById('loginPasskey').value = '';
                } else {
                    showMessage('❌ No matching user', false);
                }
            };

            window.logout = function() {
                currentUser = null;
                updateUIForUser();
                showMessage('👋 Logged out', true);
            };

            window.deleteRecord = function(id) {
                let users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const userToDelete = users.find(u => u.id == id);
                if (currentUser && userToDelete && userToDelete.id === currentUser.id) {
                    if (!confirm('Delete your own account? (You are admin)')) return;
                    users = users.filter(e => e.id != id);
                    localStorage.setItem('m10xUsers', JSON.stringify(users));
                    currentUser = null;
                    updateUIForUser();
                    showMessage('Your account deleted', true);
                    return;
                }
                users = users.filter(e => e.id != id);
                localStorage.setItem('m10xUsers', JSON.stringify(users));
                if (currentUser) {
                    const stillExists = users.find(u => u.id === currentUser.id);
                    if (!stillExists) { currentUser = null; updateUIForUser(); }
                    else if (currentUser.admission === ADMIN_ADMISSION) {
                        renderDashboardRecords();
                    }
                }
                clearMessage();
            };

                    tabLogin.classList.add('active');
                    tabSignup.classList.remove('active');
                }
                clearMessage();
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';
            };
