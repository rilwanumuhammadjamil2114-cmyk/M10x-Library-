<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP library · simple</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #eef2e6;
            padding: 1rem;
        }

        .auth-card {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 2rem 2rem 1rem 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            opacity: 0;
            transform: scale(0.95);
            animation: cardAppear 0.4s ease-out 2.5s forwards;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: scale(1); }
        }

        .library-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .library-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1a3e2b;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #cde0d3;
            display: inline-block;
            padding-bottom: 0.2rem;
        }
        .header-hint {
            display: block;
            margin-top: 0.5rem;
            color: #1a3e2b;
            background: #f0f7f0;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            background: #e2efe2;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem 0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1a3e2b;
            transition: background 0.1s;
        }
        .tab.active {
            background: white;
            font-weight: 700;
        }
        .tab i { margin-right: 6px; }

        .form-panel { display: none; }
        .form-panel.active-panel { display: block; }

        .input-group { margin-bottom: 1.2rem; }
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #1a3e2b;
        }
        .input-label i { color: #1a3e2b; }
        .input-field {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background-color: #f9fcf9;
            border: 1px solid #cde0d3;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border 0.1s;
        }
        .input-field:focus { border-color: #1a3e2b; }
        .double-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .double-row .input-group { flex: 1 1 160px; }

        .action-btn {
            background-color: #1a3e2b;
            color: white;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0 0.5rem;
            transition: background 0.1s;
        }
        .action-btn:hover { background-color: #12351f; }

        .forget-btn {
            background: transparent;
            color: #1a3e2b;
            border: 1px solid #cde0d3;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: inline-block;
            transition: background 0.1s;
        }
        .forget-btn:hover { background: #e2efe2; }

        .dashboard-panel { display: none; }
        .dashboard-panel.active-panel { display: block; }

        .welcome-card {
            background: #f0f7f0;
            border-radius: 24px;
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .personal-welcome {
            font-size: 1.3rem;
            color: #1a3e2b;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .dashboard-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .stat-box {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            flex: 1 1 120px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .stat-box i { font-size: 1.8rem; color: #1a3e2b; }
        .stat-box div { font-weight: 600; color: #1a3e2b; }

        .records-section {
            background: #f9fcf9;
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid #e0efe0;
        }
        .records-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: #1a3e2b;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .records-header i {
            background: #1a3e2b;
            color: white;
            padding: 5px 8px;
            border-radius: 50%;
            cursor: pointer;
        }
        .record-item {
            background: white;
            border-radius: 30px;
            padding: 0.7rem 1rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            border: 1px solid #e0efe0;
        }
        .record-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            color: #1f4429;
        }
        .record-info strong { color: #1a3e2b; min-width: 70px; }
        .delete-icon {
            color: #a54836;
            background: #ffe6e1;
            padding: 5px 8px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid #f3bfb0;
        }
        .delete-icon:hover { background: #d32f2f; color: white; }

        .message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 30px;
            text-align: center;
            background: #e2efe2;
        }

        .footer-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #1a3e2b;
            margin: 2rem -2rem -1rem -2rem;
            padding: 0.8rem 0.5rem;
            border-radius: 0 0 24px 24px;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            min-width: 70px;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.1s;
        }
        .footer-item i { font-size: 1.2rem; margin-bottom: 2px; }
        .footer-item:hover { background: #2d5a3b; }
        .footer-item.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .footer-item.loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .box-page {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid #e0efe0;
        }
        .box-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .price-box {
            background: #f9fcf9;
            border-radius: 16px;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            border: 1px solid #e0efe0;
        }
        .box-label {
            font-weight: 600;
            color: #1a3e2b;
            min-width: 120px;
        }
        .box-select {
            flex: 1;
            min-width: 150px;
            padding: 0.4rem 0.8rem;
            background: white;
            border: 1px solid #cde0d3;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #1a3e2b;
            cursor: pointer;
            outline: none;
        }
        .box-select:hover { background: #f0f7f0; }

        .preview-panel {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid #e0efe0;
            display: none; /* hidden by default */
        }
        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .preview-header h3 {
            color: #1a3e2b;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }
        .preview-actions { display: flex; gap: 0.5rem; }
        .preview-btn {
            background: #1a3e2b;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.1s;
        }
        .preview-btn:hover { background: #12351f; }
        .preview-content {
            background: #f9fcf9;
            border-radius: 18px;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: 'Times New Roman', serif;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0efe0;
        }
        .preview-panel.fullscreen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10000;
            background: white;
            margin: 0;
            border-radius: 0;
            border: none;
            padding: 0;
            overflow-y: auto;
        }
        .preview-panel.fullscreen .preview-header {
            padding: 1rem 2rem 0 2rem;
        }
        .preview-panel.fullscreen .preview-content {
            max-height: calc(100vh - 80px);
            margin: 0 2rem 2rem 2rem;
        }

        .semester-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #e2efe2;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .semester-tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: #1a3e2b;
        }
        .semester-tab.active {
            background: white;
            font-weight: 700;
        }

        .course-list {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e0efe0;
        }
        .course-item {
            background: #f9fcf9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: #1a3e2b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e0efe0;
        }
        .course-item i { color: #1a3e2b; font-size: 1.2rem; }

        .splash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a3e2b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            animation: splashFadeOut 0.8s ease-in-out 2.2s forwards;
        }
        .splash-content {
            text-align: center;
            color: white;
            animation: splashPop 1.2s infinite alternate;
        }
        .splash-content i { font-size: 5rem; margin-bottom: 1rem; filter: drop-shadow(0 0 10px #b5e6b5); }
        .splash-content h1 { font-size: 2.5rem; font-weight: 600; }
        .splash-content p { font-size: 1.1rem; opacity: 0.9; margin-top: 0.5rem; }
        @keyframes splashPop { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.08); opacity: 1; } }
        @keyframes splashFadeOut { to { opacity: 0; visibility: hidden; } }

        .guide-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26,62,43,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .guide-card {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 30px;
            padding: 2rem 1.5rem 1.5rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }
        .guide-slide { text-align: center; }
        .guide-slide h2 { color: #1a3e2b; margin-bottom: 1rem; font-size: 1.8rem; font-weight: 600; }
        .guide-slide p { color: #1a3e2b; font-size: 1.1rem; margin: 1rem 0; line-height: 1.5; }
        .guide-slide i { font-size: 3.5rem; color: #1a3e2b; margin: 1rem 0; }
        .guide-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 1.5rem 0 1rem;
        }
        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #b0d0b0; cursor: pointer;
        }
        .dot.active { background: #1a3e2b; }
        .guide-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .guide-btn {
            background: #1a3e2b;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        .guide-btn.outline {
            background: transparent;
            border: 2px solid #1a3e2b;
            color: #1a3e2b;
        }
        .guide-btn:hover { background: #12351f; color: white; }
        .guide-btn.outline:hover { background: #e2efe2; }

        .footer-credit {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #1a3e2b;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="splash-overlay" id="splashOverlay">
        <div class="splash-content">
            <i class="fa-solid fa-book-open"></i>
            <h1>CMP Library</h1>
            <p>chapter 2 of 4</p>
        </div>
    </div>

    <div class="auth-card">
        <div class="library-header">
            <h1>CMP chapter 2 of 4 library</h1>
            <span class="header-hint" id="globalHint"><i class="fa-regular fa-bookmark"></i> sign in / create account</span>
        </div>

        <div id="tabContainer" class="tab-container">
            <div class="tab active" id="tabSignup" onclick="switchPanel('signup')"><i class="fa-regular fa-pen-to-square"></i> sign up</div>
            <div class="tab" id="tabLogin" onclick="switchPanel('login')"><i class="fa-regular fa-id-card"></i> log in</div>
        </div>

        <div id="signupPanel" class="form-panel active-panel">
            <form onsubmit="event.preventDefault(); signupUser();">
                <div class="double-row">
                    <div class="input-group">
                        <span class="input-label"><i class="fas fa-id-card"></i> Admission No.</span>
                        <input class="input-field" type="text" id="signupAdmission" placeholder="e.g., AD2025-178" required>
                    </div>
                    <div class="input-group">
                        <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                        <input class="input-field" type="password" id="signupPasskey" placeholder="min 4 chars" required minlength="4">
                    </div>
                </div>
                <button class="action-btn" type="submit"><i class="fa-regular fa-floppy-disk"></i> create account</button>
            </form>
        </div>

        <div id="loginPanel" class="form-panel">
            <form onsubmit="event.preventDefault(); loginUser();">
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-id-card"></i> Admission number</span>
                    <input class="input-field" type="text" id="loginAdmission" placeholder="your admission" required>
                </div>
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                    <input class="input-field" type="password" id="loginPasskey" placeholder="••••••••" required>
                </div>
                <button class="action-btn" type="submit"><i class="fa-regular fa-id-card"></i> log in</button>
            </form>
            <div style="text-align: center; margin-top: 0.5rem;">
                <button class="forget-btn" onclick="forgetSavedLogin()"><i class="fa-regular fa-trash-can"></i> Forget saved login</button>
            </div>
        </div>

        <div id="dashboardPanel" class="dashboard-panel">
            <div class="welcome-card">
                <div class="personal-welcome" id="personalWelcome">
                    <i class="fa-regular fa-hand-wave"></i> Welcome, <span id="welcomeAdmission">User</span>!
                </div>
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <i class="fa-regular fa-id-card"></i>
                        <div><strong id="dashboardAdmission">---</strong></div>
                        <div>admission</div>
                    </div>
                    <div class="stat-box">
                        <i class="fa-regular fa-calendar"></i>
                        <div><strong id="dashboardSince">---</strong></div>
                        <div>member since</div>
                    </div>
                </div>
                <button class="action-btn logout-btn" onclick="logout()" style="background:#c94f4f;"><i class="fa-regular fa-arrow-left-from-bracket"></i> log out</button>
            </div>
            <div id="adminRecordsSection" style="display: none;">
                <div class="records-section">
                    <div class="records-header">
                        <span><i class="fa-regular fa-hard-drive"></i> Admin Panel · all registered users</span>
                        <i class="fas fa-rotate-right" onclick="renderDashboardRecords()" title="refresh"></i>
                    </div>
                    <div id="dashboardRecordsContainer"></div>
                </div>
            </div>
        </div>

        <div id="dynamicPageContainer" style="min-height: 300px;"></div>

        <div id="authMessage" class="message"></div>

        <div class="footer-bar">
            <div class="footer-item" onclick="handleFooterClickWithDelay('dashboard')">
                <i class="fa-solid fa-book-open"></i>
                <span>DASHBOARD</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('hd')">
                <i class="fa-solid fa-book"></i>
                <span>HD</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('info')">
                <i class="fa-solid fa-circle-info"></i>
                <span>INFO</span>
            </div>
            <div class="footer-item" onclick="handleFooterClickWithDelay('courses')">
                <i class="fa-solid fa-books"></i>
                <span>COURSES</span>
            </div>
        </div>
    </div>

    <div class="footer-credit">
        powered by tech by me (Muhammad Jamil)
    </div>

    <div id="guideOverlay" class="guide-overlay" style="display: none;">
        <div class="guide-card">
            <div id="guideSlideContainer" class="guide-slide"></div>
            <div class="guide-dots" id="guideDots"></div>
            <div class="guide-buttons">
                <button class="guide-btn outline" id="guidePrevBtn" onclick="guidePrev()">Previous</button>
                <button class="guide-btn" id="guideNextBtn" onclick="guideNext()">Next</button>
                <button class="guide-btn" id="guideFinishBtn" onclick="guideFinish()" style="display: none;">Go to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let currentUser = null;
            const ADMIN_ADMISSION = "ADMIN001";
            if (!localStorage.getItem('m10xUsers')) localStorage.setItem('m10xUsers', JSON.stringify([]));

            const guideSlides = [
                { icon: 'fa-regular fa-hand-wave', title: 'Welcome to CMP Library!', text: 'We’re glad to have you here. This guide will show you the basics.' },
                { icon: 'fa-solid fa-book-open', title: 'Dashboard', text: 'Your personal hub. View your stats and (if you are admin) all registered users.' },
                { icon: 'fa-solid fa-book', title: 'HD & INFO', text: 'HD contains course boxes with dropdowns; INFO is a simple information page.' },
                { icon: 'fa-solid fa-books', title: 'Courses', text: 'Now with semester tabs and a simple course list.' },
                { icon: 'fa-regular fa-circle-check', title: 'You’re all set!', text: 'Click "Go to Dashboard" to start.' }
            ];
            let currentSlide = 0;

            const tabContainer = document.getElementById('tabContainer');
            const signupPanel = document.getElementById('signupPanel');
            const loginPanel = document.getElementById('loginPanel');
            const dashboardPanel = document.getElementById('dashboardPanel');
            const adminRecordsSection = document.getElementById('adminRecordsSection');
            const tabSignup = document.getElementById('tabSignup');
            const tabLogin = document.getElementById('tabLogin');
            const authMessage = document.getElementById('authMessage');
            const globalHint = document.getElementById('globalHint');
            const dynamicContainer = document.getElementById('dynamicPageContainer');
            const guideOverlay = document.getElementById('guideOverlay');
            const guideSlideContainer = document.getElementById('guideSlideContainer');
            const guideDots = document.getElementById('guideDots');
            const guidePrevBtn = document.getElementById('guidePrevBtn');
            const guideNextBtn = document.getElementById('guideNextBtn');
            const guideFinishBtn = document.getElementById('guideFinishBtn');

            const welcomeAdmission = document.getElementById('welcomeAdmission');
            const dashboardAdmission = document.getElementById('dashboardAdmission');
            const dashboardSince = document.getElementById('dashboardSince');
            const dashboardRecordsContainer = document.getElementById('dashboardRecordsContainer');

            function loadSavedLogin() {
                const savedAdmission = localStorage.getItem('savedAdmission');
                const savedPasskey = localStorage.getItem('savedPasskey');
                if (savedAdmission && savedPasskey) {
                    document.getElementById('loginAdmission').value = savedAdmission;
                    document.getElementById('loginPasskey').value = savedPasskey;
                }
            }
            loadSavedLogin();

            window.forgetSavedLogin = function() {
                localStorage.removeItem('savedAdmission');
                localStorage.removeItem('savedPasskey');
                document.getElementById('loginAdmission').value = '';
                document.getElementById('loginPasskey').value = '';
                showMessage('✅ Saved login cleared.', true);
            };

            setTimeout(() => {
                const splash = document.getElementById('splashOverlay');
                if (splash) splash.style.display = 'none';
            }, 3000);

            function clearMessage() { authMessage.innerHTML = ''; }
            function showMessage(text, isSuccess = true) {
                authMessage.innerHTML = text;
                authMessage.style.background = isSuccess ? '#d9f0da' : '#ffe6e1';
            }
            function escapeHtml(str) {
                return str.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
            }

            window.renderDashboardRecords = function() {
                if (!currentUser || currentUser.admission !== ADMIN_ADMISSION) return;
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                if (!users.length) { dashboardRecordsContainer.innerHTML = '<div class="no-records">no users yet</div>'; return; }
                const sorted = [...users].reverse();
                let html = '';
                sorted.forEach(entry => {
                    const adm = escapeHtml(entry.admission);
                    const maskedPass = entry.passkey ? '•'.repeat(Math.min(entry.passkey.length, 8)) : '';
                    const time = entry.timestamp || '';
                    const isCurrent = currentUser && entry.id === currentUser.id;
                    const style = isCurrent ? 'background:#d9f0da;' : '';
                    html += `<div class="record-item" style="${style}">
                        <div class="record-info"><span><strong>adm:</strong> ${adm} ${isCurrent ? ' (you)' : ''}</span><span><strong>key:</strong> ${maskedPass}</span><span style="font-size:0.7rem;">${time}</span></div>
                        <div class="delete-icon" onclick="deleteRecord('${entry.id}')"><i class="fa-regular fa-trash-can"></i></div>
                    </div>`;
                });
                dashboardRecordsContainer.innerHTML = html;
            };

            function updateGuide() {
                const slide = guideSlides[currentSlide];
                guideSlideContainer.innerHTML = `<i class="${slide.icon}"></i><h2>${slide.title}</h2><p>${slide.text}</p>`;
                let dotsHtml = '';
                guideSlides.forEach((_, index) => dotsHtml += `<span class="dot ${index === currentSlide ? 'active' : ''}" onclick="guideJumpTo(${index})"></span>`);
                guideDots.innerHTML = dotsHtml;
                guidePrevBtn.style.display = currentSlide === 0 ? 'none' : 'inline-block';
                guideNextBtn.style.display = currentSlide === guideSlides.length - 1 ? 'none' : 'inline-block';
                guideFinishBtn.style.display = currentSlide === guideSlides.length - 1 ? 'inline-block' : 'none';
            }

            window.guideNext = function() { if (currentSlide < guideSlides.length - 1) { currentSlide++; updateGuide(); } };
            window.guidePrev = function() { if (currentSlide > 0) { currentSlide--; updateGuide(); } };
            window.guideJumpTo = function(index) { currentSlide = index; updateGuide(); };

            function markGuideAsSeen() {
                if (!currentUser) return;
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const index = users.findIndex(u => u.id === currentUser.id);
                if (index !== -1) {
                    users[index].guideSeen = true;
                    localStorage.setItem('m10xUsers', JSON.stringify(users));
                    currentUser.guideSeen = true;
                }
            }

            window.guideFinish = function() {
                guideOverlay.style.display = 'none';
                markGuideAsSeen();
                showDashboard();
            };

            function showDashboard() {
                tabContainer.style.display = 'none';
                signupPanel.classList.remove('active-panel');
                loginPanel.classList.remove('active-panel');
                dashboardPanel.classList.add('active-panel');
                globalHint.innerHTML = '<i class="fa-regular fa-circle-user"></i> dashboard · logged in';
                welcomeAdmission.textContent = currentUser.admission;
                dashboardAdmission.textContent = currentUser.admission;
                dashboardSince.textContent = currentUser.timestamp ? currentUser.timestamp.split(',')[0] : 'just now';
                if (currentUser.admission === ADMIN_ADMISSION) {
                    adminRecordsSection.style.display = 'block';
                    renderDashboardRecords();
                } else adminRecordsSection.style.display = 'none';
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';
            }

            function showGuideAndThenDashboard() {
                currentSlide = 0;
                updateGuide();
                guideOverlay.style.display = 'flex';
            }

            function transitionToLoggedIn(showGuide) {
                tabContainer.style.display = 'none';
                signupPanel.classList.remove('active-panel');
                loginPanel.classList.remove('active-panel');
                dashboardPanel.classList.remove('active-panel');
                globalHint.innerHTML = '<i class="fa-regular fa-circle-user"></i> welcome · loading';
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';

                if (showGuide) {
                    showGuideAndThenDashboard();
                } else {
                    showDashboard();
                }
                clearMessage();
            }

            window.signupUser = function() {
                const admission = document.getElementById('signupAdmission').value.trim();
                const passkey = document.getElementById('signupPasskey').value.trim();
                if (!admission || !passkey) { showMessage('❌ Both fields required', false); return; }
                if (passkey.length < 4) { showMessage('❌ Passkey min 4 chars', false); return; }
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const newEntry = {
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                    admission,
                    passkey,
                    timestamp: new Date().toLocaleString(),
                    guideSeen: false
                };
                users.push(newEntry);
                localStorage.setItem('m10xUsers', JSON.stringify(users));
                document.getElementById('signupAdmission').value = '';
                document.getElementById('signupPasskey').value = '';
                showMessage('✅ Signup successful! You can now log in.', true);
            };

            window.loginUser = function() {
                const admission = document.getElementById('loginAdmission').value.trim();
                const passkey = document.getElementById('loginPasskey').value.trim();
                if (!admission || !passkey) { showMessage('❌ Enter both', false); return; }
                const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                let matched = users.find(u => u.admission === admission && u.passkey === passkey);
                if (matched) {
                    if (matched.guideSeen === undefined) {
                        matched.guideSeen = true;
                        const index = users.findIndex(u => u.id === matched.id);
                        users[index].guideSeen = true;
                        localStorage.setItem('m10xUsers', JSON.stringify(users));
                    }
                    currentUser = { ...matched };
                    localStorage.setItem('savedAdmission', admission);
                    localStorage.setItem('savedPasskey', passkey);
                    document.getElementById('loginAdmission').value = '';
                    document.getElementById('loginPasskey').value = '';

                    const needsGuide = !currentUser.guideSeen;
                    transitionToLoggedIn(needsGuide);
                } else {
                    showMessage('❌ No matching user', false);
                }
            };

            window.logout = function() {
                currentUser = null;
                tabContainer.style.display = 'flex';
                dashboardPanel.classList.remove('active-panel');
                globalHint.innerHTML = '<i class="fa-regular fa-bookmark"></i> sign in / create account';
                switchPanel('signup');
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';
                guideOverlay.style.display = 'none';
                adminRecordsSection.style.display = 'none';
                showMessage('👋 Logged out', true);
            };

            window.deleteRecord = function(id) {
                let users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
                const userToDelete = users.find(u => u.id == id);
                if (currentUser && userToDelete && userToDelete.id === currentUser.id) {
                    if (!confirm('Delete your own account? (You are admin)')) return;
                    users = users.filter(e => e.id != id);
                    localStorage.setItem('m10xUsers', JSON.stringify(users));
                    localStorage.removeItem('savedAdmission'); localStorage.removeItem('savedPasskey');
                    currentUser = null;
                    tabContainer.style.display = 'flex';
                    dashboardPanel.classList.remove('active-panel');
                    globalHint.innerHTML = '<i class="fa-regular fa-bookmark"></i> sign in / create account';
                    switchPanel('signup');
                    dynamicContainer.style.display = 'none';
                    dynamicContainer.innerHTML = '';
                    guideOverlay.style.display = 'none';
                    adminRecordsSection.style.display = 'none';
                    showMessage('Your account deleted', true);
                    return;
                }
                users = users.filter(e => e.id != id);
                localStorage.setItem('m10xUsers', JSON.stringify(users));
                if (currentUser) {
                    const stillExists = users.find(u => u.id === currentUser.id);
                    if (!stillExists) {
                        localStorage.removeItem('savedAdmission'); localStorage.removeItem('savedPasskey');
                        currentUser = null;
                        tabContainer.style.display = 'flex';
                        dashboardPanel.classList.remove('active-panel');
                        globalHint.innerHTML = '<i class="fa-regular fa-bookmark"></i> sign in / create account';
                        switchPanel('signup');
                        dynamicContainer.style.display = 'none';
                        dynamicContainer.innerHTML = '';
                        guideOverlay.style.display = 'none';
                        adminRecordsSection.style.display = 'none';
                    } else if (currentUser.admission === ADMIN_ADMISSION) renderDashboardRecords();
                }
                clearMessage();
            };

            window.switchPanel = function(panel) {
                if (currentUser) return;
                if (panel === 'signup') { signupPanel.classList.add('active-panel'); loginPanel.classList.remove('active-panel'); tabSignup.classList.add('active'); tabLogin.classList.remove('active'); }
                else { loginPanel.classList.add('active-panel'); signupPanel.classList.remove('active-panel'); tabLogin.classList.add('active'); tabSignup.classList.remove('active'); }
                clearMessage(); dynamicContainer.style.display = 'none'; dynamicContainer.innerHTML = '';
            };

            // ----- HD course labels (same as before) -----
            const hdCourseLabels = [
                "CMP 201",
                "CMP 209",
                "ucsc 201",
                "SEN 201",
                "GST 211",
                "MTH 201",
                "IFT 211"
            ];

            const firstSemesterCourses = [...hdCourseLabels];
            const secondSemesterCourses = [ "CMP 202", "csc 203", "IFT 212", "ENT 211", "GST 212" ];

            // ----- All PDF content removed – placeholders only -----

            function renderHdBoxesWithPdfDropdown(labels) {
                const boxes = labels.map((label, idx) => {
                    // Single placeholder option – no files
                    const options = `<option value="" disabled selected>— no files —</option>`;
                    return `<div class="price-box"><span class="box-label">${label}</span><select class="box-select" onchange="handleHdSelect(this,'${label}')">${options}</select></div>`;
                }).join('');
                return `<div class="box-page"><div class="box-list">${boxes}</div><div id="previewPanel" class="preview-panel"></div></div>`;
            }

            function renderInfoPage() {
                return `<div class="box-page" style="text-align:center;padding:2rem;"><i class="fa-solid fa-circle-info" style="font-size:3rem;color:#1a3e2b;"></i><h2 style="color:#1a3e2b;">Information</h2><p style="color:#1a3e2b;">Welcome to the INFO page.</p></div>`;
            }

            function renderCourseList(courses) {
                return courses.map(l => `<div class="course-item"><i class="fa-regular fa-bookmark"></i>${l}</div>`).join('');
            }

            function renderCoursesPage() {
                return `<div class="box-page" style="background:transparent;padding:0;"><div class="semester-tabs"><div class="semester-tab active" onclick="switchSemester(1)">1st Semester</div><div class="semester-tab" onclick="switchSemester(2)">2nd Semester</div></div><div class="course-list" id="courseListContainer">${renderCourseList(firstSemesterCourses)}</div></div>`;
            }

            window.handleHdSelect = function(sel, label) {
                // No files to show – hide preview panel
                document.getElementById('previewPanel').style.display = 'none';
            };

            window.switchSemester = function(s) {
                const tabs = document.querySelectorAll('.semester-tab');
                tabs.forEach(t => t.classList.remove('active'));
                const cont = document.getElementById('courseListContainer');
                if (s===1) { tabs[0].classList.add('active'); cont.innerHTML = renderCourseList(firstSemesterCourses); }
                else { tabs[1].classList.add('active'); cont.innerHTML = renderCourseList(secondSemesterCourses); }
            };

            function performNavigation(section) {
                dashboardPanel.classList.remove('active-panel');
                tabContainer.style.display = 'none';
                dynamicContainer.style.display = 'block';
                if (section === 'dashboard') {
                    dashboardPanel.classList.add('active-panel');
                    dynamicContainer.style.display = 'none';
                    globalHint.innerHTML = '<i class="fa-regular fa-circle-user"></i> dashboard · logged in';
                } else if (section === 'hd') {
                    dynamicContainer.innerHTML = renderHdBoxesWithPdfDropdown(hdCourseLabels);
                    globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing HD · placeholders';
                } else if (section === 'info') {
                    dynamicContainer.innerHTML = renderInfoPage();
                    globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing INFO';
                } else if (section === 'courses') {
                    dynamicContainer.innerHTML = renderCoursesPage();
                    globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing COURSES';
                }
            }

            let clickTimer = null;
            window.handleFooterClickWithDelay = function(section) {
                if (!currentUser) { showMessage('🔒 Please log in first', false); return; }
                if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; document.querySelectorAll('.footer-item').forEach(el => el.classList.remove('loading')); }
                const items = document.querySelectorAll('.footer-item');
                let clickedItem = null;
                items.forEach(item => { if (item.querySelector('span').innerText.trim() === section.toUpperCase()) clickedItem = item; });
                if (clickedItem) clickedItem.classList.add('loading');
                clickTimer = setTimeout(() => {
                    document.querySelectorAll('.footer-item').forEach(el => el.classList.remove('loading'));
                    performNavigation(section);
                    clickTimer = null;
                }, 1500);
            };
            switchPanel('signup');
        })();
    </script>
</body>
</html>
