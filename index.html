<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP library · 7‑box pages</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #c8dbc1;
            padding: 1rem;
        }

        /* main white card */
        .auth-card {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 2rem 2rem 1rem 2rem;
            border-radius: 24px;
            border: 2px solid #1c4b2d;
        }

        /* header */
        .library-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .library-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1c4b2d;
            border-bottom: 2px solid #98c0a0;
            padding-bottom: 0.3rem;
            display: inline-block;
        }
        .header-hint {
            display: block;
            margin-top: 0.5rem;
            color: #1c4b2d;
            background: #e0f0e0;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* tabs – height doubled */
        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            background: #d0e8d0;
            padding: 0.4rem;
            border-radius: 40px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1.2rem 0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2rem;
            color: #1c4b2d;
            border: 1px solid transparent;
        }
        .tab.active {
            background: white;
            border: 1px solid #1c4b2d;
            font-weight: 700;
        }

        /* forms */
        .form-panel { display: none; }
        .form-panel.active-panel { display: block; }

        .input-group { margin-bottom: 1.2rem; }
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #1c4b2d;
        }
        .input-field {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 2px solid #9fc0a5;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus { border-color: #1c4b2d; }
        .double-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .double-row .input-group { flex: 1 1 160px; }

        .action-btn {
            background-color: #1c4b2d;
            color: white;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0 0.5rem;
            border: 1px solid #9fc0a5;
        }
        .action-btn:hover { background-color: #0f381d; }

        /* dashboard panel */
        .dashboard-panel { display: none; }
        .dashboard-panel.active-panel { display: block; }

        .welcome-card {
            background: #e0f0e0;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px solid #1c4b2d;
        }
        .personal-welcome {
            font-size: 1.3rem;
            color: #1c4b2d;
            margin-bottom: 1rem;
        }
        .dashboard-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .stat-box {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            flex: 1 1 120px;
            text-align: center;
            border: 1px solid #1c4b2d;
        }
        .stat-box i { font-size: 1.8rem; color: #1c4b2d; }

        /* records */
        .records-section {
            background: #f0f8f0;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #1c4b2d;
        }
        .records-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: #1c4b2d;
            font-weight: 600;
        }
        .records-header i {
            background: #1c4b2d;
            color: white;
            padding: 5px 8px;
            border-radius: 50%;
            cursor: pointer;
        }
        .record-item {
            background: white;
            border-radius: 30px;
            padding: 0.7rem 1rem;
            margin-bottom: 8px;
            border-left: 6px solid #1c4b2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-icon {
            background: #ffe6e1;
            padding: 5px 8px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* message area */
        .message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 30px;
            text-align: center;
            background: #e0f0e0;
        }

        /* ===== FOOTER BAR – transparent, inline, with small icons ===== */
        .footer-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: transparent;        /* fully transparent */
            margin: 2rem -2rem -1rem -2rem;
            padding: 0.8rem 0.5rem;
            border-top: 1px solid #1c4b2d;  /* subtle separation */
            gap: 0.3rem;
            flex-wrap: nowrap;              /* force single line */
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            min-width: 70px;
            color: #1c4b2d;                  /* dark green text */
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.1s;
            text-align: center;
        }
        .footer-item i {
            font-size: 1.2rem;               /* small icon */
            margin-bottom: 2px;
            color: #1c4b2d;
        }
        .footer-item:hover {
            background: rgba(28, 75, 45, 0.1); /* subtle hover */
        }

        /* animated welcome overlay */
        .animation-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28, 75, 45, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.8s;
        }
        .animation-box {
            background: white;
            padding: 2rem 3rem;
            border-radius: 50px;
            text-align: center;
            border: 4px solid #b5e6b5;
            box-shadow: 0 0 30px #a5d6a5;
            animation: pop 0.5s ease-out;
        }
        .animation-box i {
            font-size: 4rem;
            color: #1c4b2d;
            margin-bottom: 1rem;
        }
        .animation-box p {
            font-size: 2rem;
            color: #1c4b2d;
            font-weight: 600;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }

        /* 7‑box layout for HD, PQ, COURSES */
        .box-page {
            background: #f5fff5;
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #1c4b2d;
            margin: 1rem 0;
            height: 450px;
            overflow-y: auto;
        }
        .box-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .price-box {
            background: white;
            border: 1px solid #1c4b2d;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #1c4b2d;
            box-shadow: 0 2px 6px rgba(0,40,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 55px;
        }
        .price-box span {
            color: #2b6e3b;
            font-weight: 400;
        }
        .price-box:nth-child(even) {
            background: #f0faf0;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <!-- header -->
    <div class="library-header">
        <h1>CMP chapter 2 of 4 library</h1>
        <span class="header-hint" id="globalHint"><i class="fa-regular fa-bookmark"></i> sign in / create account</span>
    </div>

    <!-- tabs (height doubled) -->
    <div id="tabContainer" class="tab-container">
        <div class="tab active" id="tabSignup" onclick="switchPanel('signup')"><i class="fa-regular fa-pen-to-square"></i> sign up</div>
        <div class="tab" id="tabLogin" onclick="switchPanel('login')"><i class="fa-regular fa-id-card"></i> log in</div>
    </div>

    <!-- SIGNUP -->
    <div id="signupPanel" class="form-panel active-panel">
        <form onsubmit="event.preventDefault(); signupUser();">
            <div class="double-row">
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-id-card"></i> Admission No.</span>
                    <input class="input-field" type="text" id="signupAdmission" placeholder="e.g., AD2025-178" required>
                </div>
                <div class="input-group">
                    <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                    <input class="input-field" type="password" id="signupPasskey" placeholder="min 4 chars" required minlength="4">
                </div>
            </div>
            <button class="action-btn" type="submit"><i class="fa-regular fa-floppy-disk"></i> create account</button>
        </form>
    </div>

    <!-- LOGIN -->
    <div id="loginPanel" class="form-panel">
        <form onsubmit="event.preventDefault(); loginUser();">
            <div class="input-group">
                <span class="input-label"><i class="fas fa-id-card"></i> Admission number</span>
                <input class="input-field" type="text" id="loginAdmission" placeholder="your admission" required>
            </div>
            <div class="input-group">
                <span class="input-label"><i class="fas fa-lock"></i> Passkey</span>
                <input class="input-field" type="password" id="loginPasskey" placeholder="••••••••" required>
            </div>
            <button class="action-btn" type="submit"><i class="fa-regular fa-id-card"></i> log in</button>
        </form>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPanel" class="dashboard-panel">
        <div class="welcome-card">
            <div class="personal-welcome" id="personalWelcome">
                <i class="fa-regular fa-hand-wave"></i> Welcome, <span id="welcomeAdmission">User</span>!
            </div>
            <div class="dashboard-stats">
                <div class="stat-box">
                    <i class="fa-regular fa-id-card"></i>
                    <div><strong id="dashboardAdmission">---</strong></div>
                    <div>admission</div>
                </div>
                <div class="stat-box">
                    <i class="fa-regular fa-calendar"></i>
                    <div><strong id="dashboardSince">---</strong></div>
                    <div>member since</div>
                </div>
            </div>
            <button class="action-btn logout-btn" onclick="logout()" style="background:#c94f4f;"><i class="fa-regular fa-arrow-left-from-bracket"></i> log out</button>
        </div>
        <div id="dashboardHome" class="records-section">
            <div class="records-header">
                <span><i class="fa-regular fa-hard-drive"></i> all registered users</span>
                <i class="fas fa-rotate-right" onclick="renderDashboardRecords()" title="refresh"></i>
            </div>
            <div id="dashboardRecordsContainer"></div>
        </div>
    </div>

    <!-- container for dynamic pages (HD, PQ, COURSES) -->
    <div id="dynamicPageContainer" style="min-height: 300px;"></div>

    <!-- message area -->
    <div id="authMessage" class="message"></div>

    <!-- FOOTER BAR – transparent, inline, with small icons -->
    <div class="footer-bar">
        <div class="footer-item" onclick="handleFooterClick('dashboard')">
            <i class="fa-solid fa-book-open"></i>
            <span>DASHBOARD</span>
        </div>
        <div class="footer-item" onclick="handleFooterClick('hd')">
            <i class="fa-solid fa-book"></i>
            <span>HD</span>
        </div>
        <div class="footer-item" onclick="handleFooterClick('pq')">
            <i class="fa-solid fa-bookmark"></i>
            <span>PQ</span>
        </div>
        <div class="footer-item" onclick="handleFooterClick('courses')">
            <i class="fa-solid fa-books"></i>
            <span>COURSES</span>
        </div>
    </div>
</div>

<script>
    (function() {
        let currentUser = null;
        if (!localStorage.getItem('m10xUsers')) {
            localStorage.setItem('m10xUsers', JSON.stringify([]));
        }

        // DOM
        const tabContainer = document.getElementById('tabContainer');
        const signupPanel = document.getElementById('signupPanel');
        const loginPanel = document.getElementById('loginPanel');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const tabSignup = document.getElementById('tabSignup');
        const tabLogin = document.getElementById('tabLogin');
        const authMessage = document.getElementById('authMessage');
        const globalHint = document.getElementById('globalHint');
        const dynamicContainer = document.getElementById('dynamicPageContainer');

        const welcomeAdmission = document.getElementById('welcomeAdmission');
        const dashboardAdmission = document.getElementById('dashboardAdmission');
        const dashboardSince = document.getElementById('dashboardSince');
        const dashboardRecordsContainer = document.getElementById('dashboardRecordsContainer');

        function clearMessage() { authMessage.innerHTML = ''; }
        function showMessage(text, isSuccess = true) {
            authMessage.innerHTML = text;
            authMessage.style.background = isSuccess ? '#d9f0da' : '#ffe6e1';
        }
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
        }

        window.renderDashboardRecords = function() {
            if (!currentUser) return;
            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            if (!users.length) {
                dashboardRecordsContainer.innerHTML = '<div class="no-records">no users yet</div>';
                return;
            }
            const sorted = [...users].reverse();
            let html = '';
            sorted.forEach(entry => {
                const adm = escapeHtml(entry.admission);
                const maskedPass = entry.passkey ? '•'.repeat(Math.min(entry.passkey.length, 8)) : '';
                const time = entry.timestamp || '';
                const isCurrent = currentUser && entry.id === currentUser.id;
                const style = isCurrent ? 'background:#d9f0da;' : '';
                html += `<div class="record-item" style="${style}">
                    <div><strong>adm:</strong> ${adm} ${isCurrent ? '(you)' : ''}<br><span style="font-size:0.7rem;">${time}</span></div>
                    <div><span style="font-size:0.8rem;">key: ${maskedPass}</span></div>
                    <div class="delete-icon" onclick="deleteRecord('${entry.id}')"><i class="fa-regular fa-trash-can"></i></div>
                </div>`;
            });
            dashboardRecordsContainer.innerHTML = html;
        };

        // animated login page
        function showAnimationAndDashboard() {
            const overlay = document.createElement('div');
            overlay.className = 'animation-overlay';
            overlay.innerHTML = `
                <div class="animation-box">
                    <i class="fa-regular fa-circle-check"></i>
                    <p>Welcome back!</p>
                    <small style="color:#1c4b2d;">loading your dashboard...</small>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => {
                overlay.remove();
                tabContainer.style.display = 'none';
                signupPanel.classList.remove('active-panel');
                loginPanel.classList.remove('active-panel');
                dashboardPanel.classList.add('active-panel');
                globalHint.innerHTML = '<i class="fa-regular fa-circle-user"></i> dashboard · logged in';
                welcomeAdmission.textContent = currentUser.admission;
                dashboardAdmission.textContent = currentUser.admission;
                dashboardSince.textContent = currentUser.timestamp ? currentUser.timestamp.split(',')[0] : 'just now';
                renderDashboardRecords();
                clearMessage();
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';
            }, 1500);
        }

        function updateUIForUser() {
            if (currentUser) {
                showAnimationAndDashboard();
            } else {
                tabContainer.style.display = 'flex';
                dashboardPanel.classList.remove('active-panel');
                globalHint.innerHTML = '<i class="fa-regular fa-bookmark"></i> sign in / create account';
                switchPanel('signup');
                dynamicContainer.style.display = 'none';
                dynamicContainer.innerHTML = '';
            }
        }

        // signup
        window.signupUser = function() {
            const admission = document.getElementById('signupAdmission').value.trim();
            const passkey = document.getElementById('signupPasskey').value.trim();
            if (!admission || !passkey) { showMessage('❌ Both fields required', false); return; }
            if (passkey.length < 4) { showMessage('❌ Passkey min 4 chars', false); return; }
            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            const newEntry = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                admission, passkey, timestamp: new Date().toLocaleString()
            };
            users.push(newEntry);
            localStorage.setItem('m10xUsers', JSON.stringify(users));
            document.getElementById('signupAdmission').value = '';
            document.getElementById('signupPasskey').value = '';
            showMessage('✅ Signup successful! You can now log in.', true);
        };

        // login
        window.loginUser = function() {
            const admission = document.getElementById('loginAdmission').value.trim();
            const passkey = document.getElementById('loginPasskey').value.trim();
            if (!admission || !passkey) { showMessage('❌ Enter both', false); return; }
            const users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            const matched = users.find(u => u.admission === admission && u.passkey === passkey);
            if (matched) {
                currentUser = { ...matched };
                updateUIForUser();
                document.getElementById('loginAdmission').value = '';
                document.getElementById('loginPasskey').value = '';
            } else {
                showMessage('❌ No matching user', false);
            }
        };

        window.logout = function() {
            currentUser = null;
            updateUIForUser();
            showMessage('👋 Logged out', true);
        };

        window.deleteRecord = function(id) {
            let users = JSON.parse(localStorage.getItem('m10xUsers')) || [];
            const userToDelete = users.find(u => u.id == id);
            if (currentUser && userToDelete && userToDelete.id === currentUser.id) {
                if (!confirm('Delete your own account?')) return;
                users = users.filter(e => e.id != id);
                localStorage.setItem('m10xUsers', JSON.stringify(users));
                currentUser = null;
                updateUIForUser();
                showMessage('Your account deleted', true);
                return;
            }
            users = users.filter(e => e.id != id);
            localStorage.setItem('m10xUsers', JSON.stringify(users));
            if (currentUser) {
                const stillExists = users.find(u => u.id === currentUser.id);
                if (!stillExists) { currentUser = null; updateUIForUser(); }
                else renderDashboardRecords();
            }
        };

        window.switchPanel = function(panel) {
            if (currentUser) return;
            if (panel === 'signup') {
                signupPanel.classList.add('active-panel');
                loginPanel.classList.remove('active-panel');
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
            } else {
                loginPanel.classList.add('active-panel');
                signupPanel.classList.remove('active-panel');
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
            }
            clearMessage();
            dynamicContainer.style.display = 'none';
            dynamicContainer.innerHTML = '';
        };

        // Helper to generate 7 boxes
        function renderSevenBoxes(title) {
            const boxes = [];
            for (let i = 1; i <= 7; i++) {
                const base = 68000 - i * 100;
                boxes.push(`
                    <div class="price-box">
                        <span>${title} ${i}</span>
                        <span>${base.toFixed(2)}</span>
                    </div>
                `);
            }
            return `
                <div class="box-page">
                    <div class="box-list">
                        ${boxes.join('')}
                    </div>
                </div>
            `;
        }

        // footer click handler
        window.handleFooterClick = function(section) {
            if (!currentUser) {
                showMessage('🔒 Please log in first', false);
                return;
            }
            dashboardPanel.classList.remove('active-panel');
            tabContainer.style.display = 'none';
            dynamicContainer.style.display = 'block';

            if (section === 'dashboard') {
                dashboardPanel.classList.add('active-panel');
                dynamicContainer.style.display = 'none';
                globalHint.innerHTML = '<i class="fa-regular fa-circle-user"></i> dashboard · logged in';
            } else if (section === 'hd') {
                dynamicContainer.innerHTML = renderSevenBoxes('HD');
                globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing HD · 7 boxes';
            } else if (section === 'pq') {
                dynamicContainer.innerHTML = renderSevenBoxes('PQ');
                globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing PQ · 7 boxes';
            } else if (section === 'courses') {
                dynamicContainer.innerHTML = renderSevenBoxes('COURSE');
                globalHint.innerHTML = '<i class="fa-regular fa-eye"></i> viewing COURSES · 7 boxes';
            }
        };

        // initial
        switchPanel('signup');
    })();
</script>
</body>
</html>
